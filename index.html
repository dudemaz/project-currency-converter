<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css-files/reset.css">
    <link rel="stylesheet" href="css-files/style.css">
    <script type="module" src="./js/animation/mouse-animations.min.js"></script>
    <script type="module" src="./js/animation/animation.js"></script>
    <script defer type="module" src="js/main.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>

    <title>Currency Converter</title>
</head>
<body>
    <div class="app spotlight-target">
      <span class="parallax-target" id="DataCurrencyactually"></span>
  <h1>Currency Converter</h1>

  <div class="converter">
    <input
    min="0"
    type="number"
    id="amount"
    placeholder="Введите сумму"
    
    />

    <div class="selects">
      <select id="from"></select>
     <button id="swap">Swap</button>
      <select id="to"></select>
    </div>

    <button id="convertBtn">Конвертировать</button>
    <p id="result"></p>
  </div>

  <div class="history">
    <h2>История</h2>
    <button id="openHistory">Открыть</button>
    <dialog class="" id="myDialog">
    <div id="historyblock"></div>
    <button id="closeBtn">Закрыть</button>
    </dialog>
  </div>
</div>
</body>
</html>
