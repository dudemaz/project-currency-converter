<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css-files/style.css">
    <link rel="stylesheet" href="css-files/reset.css">
    <link rel="stylesheet" href="/assets/magic.css" />
    <script defer type="module" src="js/main.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@jh3y/whirl@2.0.0/css/whirl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/air-datepicker@3.6.0/air-datepicker.css" />
<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/air-datepicker@3.6.0/air-datepicker.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

    <title>Currency Converter</title>
</head>
<body>
  <div id="particles-js"></div>
  <div id="loader-screen" class="loader-screen">
        <div class="whirl whirl-3"></div>
        <p>Загрузка актуальных курсов валют...</p>
    </div>
    <div id="app">
      <span class="parallax-target" id="DataCurrencyactually"></span>
  <h1 class="magictime puffIn">Конвектор валют</h1>

  <div class="converter">
    <input
    min="0"
    type="number"
    id="amount"
    placeholder="Введите сумму"
    
    />

    <div class="selects">
      <select id="from"></select>
     <button id="swap">Swap</button>
      <select id="to"></select>
    </div>

    <button id="convertBtn">Конвертировать</button>
    <p id="result"></p>
  </div>

  <div class="history">
    <h2>🕘История</h2>
    <button id="openHistory">Открыть</button>
    <dialog class="" id="myDialog">
    <div id="historyblock"></div>
    <button id="closeBtn">Закрыть</button>
    </dialog>
  </div>
  
</div>
  <div class="form-of-history-data">
    <label>Выбери дату:</label>
  <input type="text" id="dateInput" placeholder="YYYY-MM-DD">

  <button id="historyLoadData">Загрузить курсы</button>
  <button id="returnActual">Вернуть актуальные курсы</button>
  </div>
</body>
</html>
